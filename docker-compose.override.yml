# override 
services:
  rabbit-mq:
    image: rabbitmq:3.8-management
    container_name: campus-rabbitmq
    ports:
      - "5672:5672"     # app connection
      - "15672:15672"   # UI dashboard
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: campus-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: campus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: Chaitanya
      POSTGRES_PASSWORD: Chaitanya@123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped 

  auth-service:
    build: ./services/auth-service
    ports:
      - "3000:3000"
    env_file:
    - ./services/auth-service/.env
    environment:
      NODE_ENV: development
    volumes:
      - ./services/auth-service:/app   
      - /app/node_modules
    command: pnpm run dev 
    depends_on:
    #   - rabbit-mq
      # - redis
      - postgres
    restart: unless-stopped

  # user-service:
  #   build: ./services/user-service
  #   ports:
  #     - "3001:3000"
  #   env_file:
  #     - ./services/user-service/.env  
  #   environment:
  #     NODE_ENV: development
  #   volumes:  
  #     - ./services/user-service:/app
  #     - /app/node_modules
  #   command : pnpm run dev   
  #   depends_on:
  #     - rabbit-mq
  #     - postgres
  #   restart: unless-stopped  
    
volumes:
  postgres_data:

